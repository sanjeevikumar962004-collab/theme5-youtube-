<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Stackly</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-page">
    <a href="login.html" class="back-to-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Back to Login
    </a>

    <div class="auth-card glass">
        <img src="images/stackly logo RED.webp" alt="Stackly" class="auth-logo">
        <div class="auth-header">
            <h1>Reset Password</h1>
            <p>Enter your email to receive a reset link.</p>
        </div>

        <form id="forgot-form" novalidate>
            <div class="form-group">
                <input type="email" class="form-control" id="email" placeholder=" " required>
                <label for="email" class="form-label">Email Address</label>
                <div class="error-msg">Please enter a valid email.</div>
            </div>

            <button type="submit" class="slice w-100 mt-1" id="submit-btn"><span class="text">Send Reset Link</span></button>
        </form>

        <div class="auth-footer">
            Remembered? <a href="login.html" class="auth-link">Back to Sign In</a>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const forgotForm = document.getElementById('forgot-form');
            if (forgotForm) {
                setupFormValidation(forgotForm);
            }
        });
    </script>
</body>
</html>
