<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Stackly</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-page">
    <a href="index.html" class="back-to-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Back to Home
    </a>

    <div class="auth-card glass">
        <img src="images/stackly logo RED.webp" alt="Stackly" class="auth-logo">
        <div class="auth-header">
            <h1>Welcome Back</h1>
            <p>Please enter your details to sign in.</p>
        </div>

        <form id="login-form" novalidate>
            <div class="form-group">
                <input type="email" class="form-control" id="email" placeholder=" " required>
                <label for="email" class="form-label">Email Address</label>
                <div class="error-msg">Please enter a valid email.</div>
            </div>

            <div class="form-group">
                <input type="password" class="form-control" id="password" placeholder=" " required>
                <label for="password" class="form-label">Password</label>
                <div class="error-msg">Password is required.</div>
            </div>

            <div style="text-align: right; margin-bottom: 2rem;">
                <a href="forgot-password.html" class="auth-link" style="font-size: 0.85rem;">Forgot Password?</a>
            </div>

            <button type="submit" class="slice w-100" id="submit-btn"><span class="text">Sign In</span></button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="signup.html" class="auth-link">Sign Up</a>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('login-form');
            if (loginForm) {
                setupFormValidation(loginForm);
            }
        });
    </script>
</body>
</html>
